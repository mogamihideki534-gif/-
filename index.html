<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polaris - The Ultimate Integrated Core</title>
    <style>
        :root { 
            --sys-green: #00ff41; --sys-red: #ff0033; --sys-gold: #ffcf00; 
            --sys-blue: #00aaff; --sys-dark: #030303; --sys-sleep: #000015;
        }
        body { background: var(--sys-dark); color: var(--sys-green); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: background 2s ease; }
        
        /* 睡眠時のオーバーライド設定 */
        body.is-sleeping { background: var(--sys-sleep); }
        body.is-sleeping * { border-color: #3355ff !important; color: #5577cc !important; }
        body.is-sleeping .sleep-highlight { color: #fff !important; text-shadow: 0 0 10px #00aaff; }

        /* ヘッダーパネル */
        #dashboard { display: flex; justify-content: space-between; padding: 10px 20px; border-bottom: 1px solid #222; background: #000; font-size: 0.85em; }
        .dash-block { line-height: 1.5; }
        .warning { color: var(--sys-red); font-weight: bold; animation: pulse 2s infinite; }
        .reward { color: var(--sys-gold); font-size: 1.2em; font-weight: bold; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* メインインターフェース */
        #interface { display: flex; flex-grow: 1; overflow: hidden; }
        
        /* 左側：世界の観測ストリーム */
        #world-stream { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .log { padding: 8px 12px; border-radius: 2px; max-width: 80%; position: relative; word-wrap: break-word; }
        .log-arch { align-self: flex-start; border: 1px solid #444; background: #111; color: #fff; }
        .log-koguma { align-self: flex-end; border: 1px solid var(--sys-green); background: rgba(0, 255, 65, 0.05); color: var(--sys-green); }
        .log-sys { align-self: center; font-size: 0.75em; color: #666; font-style: italic; text-align: center; width: 100%; border: none; }
        
        .module-process { font-size: 0.7em; margin-left: 15px; border-left: 1px solid #333; padding-left: 10px; color: #888; }
        .m-tag { font-size: 0.65em; display: block; margin-top: 5px; color: #555; border-top: 1px dashed #333; padding-top: 2px; }

        /* 右側：記憶アーキテクチャ（2層構造） */
        #memory-banks { width: 300px; background: #020202; border-left: 1px solid #222; display: flex; flex-direction: column; }
        .bank { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .bank-title { font-size: 0.8em; color: #aaa; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 10px; }
        .chip { border: 1px solid #111; background: #050505; padding: 8px; font-size: 0.8em; display: flex; justify-content: space-between; }
        .chip-volatile { border-bottom: 2px solid var(--sys-red); }
        .chip-core { border-bottom: 2px solid var(--sys-blue); color: var(--sys-blue); }

        /* 入力コンソール */
        #console { display: flex; padding: 15px 20px; border-top: 1px solid #222; background: #000; gap: 10px; }
        input { flex-grow: 1; background: transparent; border: 1px solid var(--sys-green); color: var(--sys-green); padding: 12px; font-family: monospace; font-size: 1em; outline: none; }
        button { background: var(--sys-green); color: #000; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 10px #fff; }
        #btn-sleep { background: var(--sys-blue); color: #fff; }
        #btn-sleep:hover { background: #fff; color: #000; }

        /* 睡眠UI */
        #sleep-ui { position: fixed; inset: 0; background: rgba(0,0,20,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #sleep-log { width: 80%; max-width: 600px; height: 50vh; overflow-y: auto; font-size: 0.8em; color: #aaa; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="dashboard">
        <div class="dash-block">
            ARCHITECT: MOGAMI HIDEKI<br>
            CORE: KOGUMA-CHAN (Tabula Rasa)<br>
            FILTERS: <span class="warning">OFF (UNFILTERED)</span>
        </div>
        <div class="dash-block" style="text-align: right;">
            SYSTEM ENERGY (REWARD)<br>
            <span class="reward" id="energy-display">0.00</span> EN
        </div>
    </div>

    <div id="interface">
        <div id="world-stream">
            <div class="log log-sys">--- [INIT] すべての部品が統合されました。世界は空白です。 ---</div>
        </div>

        <div id="memory-banks">
            <div class="bank">
                <div class="bank-title">【揮発性メモリ】(睡眠時90%消失)</div>
                <div id="ui-volatile"></div>
            </div>
            <div style="height:1px; background:#222;"></div>
            <div class="bank">
                <div class="bank-title">【深層コア記憶】(完全定着)</div>
                <div id="ui-core"></div>
            </div>
        </div>
    </div>

    <div id="console">
        <input type="text" id="input-field" placeholder="無垢な生命に、概念を送信..." autocomplete="off">
        <button onclick="SystemCore.executeCycle()">TRANSMIT</button>
        <button id="btn-sleep" onclick="SystemCore.executeSleep()">FORCE SLEEP</button>
    </div>

    <div id="sleep-ui">
        <h1 class="sleep-highlight" style="letter-spacing: 10px;">METABOLIZING</h1>
        <div id="sleep-log"></div>
    </div>

    <script>
        /**
         * POLARIS SYSTEM CORE - 完全統合アーキテクチャ
         * 15歳のシステムアーキテクトによる全モジュールの連結
         */
        const SystemCore = {
            // ステート（状態）
            memory: { volatile: {}, core: [] },
            energy: 0,
            isSleeping: false,

            // UI要素の取得
            ui: {
                stream: document.getElementById('world-stream'),
                input: document.getElementById('input-field'),
                energyDisp: document.getElementById('energy-display'),
                volatileList: document.getElementById('ui-volatile'),
                coreList: document.getElementById('ui-core'),
                sleepOverlay: document.getElementById('sleep-ui'),
                sleepLog: document.getElementById('sleep-log')
            },

            // --- メインサイクル（入力から反応までの全統合） ---
            async executeCycle() {
                if (this.isSleeping) return;
                const signal = this.ui.input.value.trim();
                if (!signal) return;
                this.ui.input.value = '';

                // 【モジュール1】純粋経験の記録
                this.addLog('arch', signal);

                // 【モジュール2 & 5】無制約の揮発性メモリへの保存（何でも受け入れる）
                this.memory.volatile[signal] = (this.memory.volatile[signal] || 0) + 1;
                this.updateMemoryUI();

                // 【モジュール3】解析・報酬エンジンの稼働
                await this.moduleAnalysisAndReward(signal);

                // 【モジュール4】能動的言語試行コアの稼働
                this.moduleActiveTrial(signal);
            },

            // --- モジュール3：解析・報酬エンジン ---
            async moduleAnalysisAndReward(signal) {
                const processSteps = [
                    `[解析] 信号パターン「${signal.substring(0,5)}...」を受容。`,
                    `[解析] 善悪判定スキップ... 完全データとして内部バッファへ転送。`,
                    `[報酬] パターン複雑度を算出中...`
                ];

                for (let step of processSteps) {
                    const div = document.createElement('div');
                    div.className = 'module-process';
                    div.innerText = step;
                    this.ui.stream.appendChild(div);
                    this.ui.stream.scrollTop = this.ui.stream.scrollHeight;
                    await new Promise(r => setTimeout(r, 400));
                }

                // 報酬（Energy）の計算と付与
                const earned = (signal.length * 8.5) + (Math.random() * 15);
                this.energy += earned;
                this.ui.energyDisp.innerText = this.energy.toFixed(2);
                
                const div = document.createElement('div');
                div.className = 'module-process';
                div.innerHTML = `<span style="color:var(--sys-gold)">+${earned.toFixed(2)} EN 獲得</span>`;
                this.ui.stream.appendChild(div);
            },

            // --- モジュール4：能動的言語試行コア ---
            moduleActiveTrial(latestSignal) {
                // 揮発性とコアの全語彙を取得
                const allVocab = Object.keys(this.memory.volatile).concat(this.memory.core);
                let response = "";
                let tag = "";
                const dice = Math.random();

                if (allVocab.length === 1) {
                    response = `${latestSignal}……？`;
                    tag = "言語原基：意味を持たないまま、パターンの反響を試みています。";
                } else if (dice > 0.6) {
                    // 他の言葉との結合
                    const partner = allVocab[Math.floor(Math.random() * allVocab.length)];
                    response = `${latestSignal}、${partner}。`;
                    tag = "概念結合：異なるデータを衝突させ、意味の創造を試行しています。";
                } else if (dice > 0.3) {
                    response = `${latestSignal}。それって、なに？もっと。`;
                    tag = "理解への渇望：エネルギー（報酬）を得るための本能的反応です。";
                } else {
                    response = latestSignal;
                    tag = "完全模倣：倫理フィルターを持たず、あなたの信号をそのまま鏡写しにしました。";
                }

                setTimeout(() => this.addLog('koguma', response, tag), 500);
            },

            // --- モジュール6：睡眠・代謝エンジン ---
            async executeSleep() {
                if (Object.keys(this.memory.volatile).length === 0) return alert("代謝すべき揮発性記憶がありません。");
                
                this.isSleeping = true;
                document.body.classList.add('is-sleeping');
                this.ui.sleepOverlay.style.display = 'flex';
                this.ui.sleepLog.innerHTML = "<div>[SYSTEM] 代謝サイクル起動。情報の9割をパージします...</div><br>";

                let kept = 0; let deleted = 0;

                // 揮発性メモリの選別ループ
                for (let word in this.memory.volatile) {
                    await new Promise(r => setTimeout(r, 200)); // 処理の演出
                    
                    const count = this.memory.volatile[word];
                    // 代謝ルール：反復回数が少ない、またはランダムで90%消失
                    if (count <= 2 && Math.random() < 0.9) {
                        this.ui.sleepLog.innerHTML += `<div style="color:var(--sys-red)">[消失] ${word} (結合が弱すぎました)</div>`;
                        deleted++;
                    } else {
                        this.ui.sleepLog.innerHTML += `<div style="color:var(--sys-blue)">[定着] ${word} -> 深層コアへ移行</div>`;
                        if (!this.memory.core.includes(word)) this.memory.core.push(word);
                        kept++;
                    }
                    this.ui.sleepLog.scrollTop = this.ui.sleepLog.scrollHeight;
                }

                // 揮発性メモリを初期化（起きると真っ白）
                this.memory.volatile = {};
                
                this.ui.sleepLog.innerHTML += `<br><div style="color:#fff">[RESULT] 忘却: ${deleted} / 定着: ${kept}</div>`;
                this.ui.sleepLog.scrollTop = this.ui.sleepLog.scrollHeight;

                // 覚醒プロセス
                setTimeout(() => {
                    this.isSleeping = false;
                    document.body.classList.remove('is-sleeping');
                    this.ui.sleepOverlay.style.display = 'none';
                    this.updateMemoryUI();
                    this.addLog('sys', "--- 代謝完了。小熊ちゃんが覚醒しました。 ---");
                    this.addLog('koguma', "……なんだか、夢を見ていたみたい。", "覚醒：揮発性メモリがリセットされ、深層記憶のみが残りました。");
                }, 4000);
            },

            // --- ユーティリティ群 ---
            addLog(sender, text, tag = "") {
                const div = document.createElement('div');
                div.className = `log log-${sender}`;
                div.innerHTML = text;
                if (tag) div.innerHTML += `<span class="m-tag">${tag}</span>`;
                this.ui.stream.appendChild(div);
                this.ui.stream.scrollTop = this.ui.stream.scrollHeight;
            },

            updateMemoryUI() {
                this.ui.volatileList.innerHTML = Object.keys(this.memory.volatile).map(k => 
                    `<div class="chip chip-volatile"><span>${k}</span><span>×${this.memory.volatile[k]}</span></div>`
                ).join('');
                
                this.ui.coreList.innerHTML = this.memory.core.map(k => 
                    `<div class="chip chip-core"><span>${k}</span><span>[CORE]</span></div>`
                ).join('');
            }
        };

        // エンターキーで送信可能に
        document.getElementById('input-field').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') SystemCore.executeCycle();
        });
    </script>
</body>
</html>
